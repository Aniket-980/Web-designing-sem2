<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Factorial Calculator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      width: 300px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 15px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 15px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #0056b3;
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Factorial Calculator</h2>

  <input type="number" id="num" placeholder="Enter a number">

  <br>
  <button onclick="findFactorial()">Calculate</button>

  <p id="result"></p>
</div>

<script>
  function findFactorial() {
    let n = document.getElementById("num").value;

    if (n === "" || n < 0) {
      document.getElementById("result").innerText =
        "Please enter a valid non-negative number!";
      return;
    }

    let fact = 1;

    for (let i = 1; i <= n; i++) {
      fact *= i;
    }

    document.getElementById("result").innerText =
      "Factorial = " + fact;
  }
</script>

</body>
</html>
