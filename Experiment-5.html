<!DOCTYPE html>
<html>
<head>
    <title>Employee Salary Management</title>

    <style>
        body{
            font-family: Arial;
            background:rgb(242, 242, 242);
            text-align:center;
        }

        .box{
            background:white;
            width:400px;
            margin:auto;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        input{
            width:90%;
            padding:10px;
            margin:5px;
        }

        button{
            padding:10px 15px;
            margin:5px;
            background:rgb(0, 255, 145);
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        #output{
            margin-top:20px;
            text-align:left;
        }
    </style>
</head>
<body>

<div class="box">

    <h2>Employee Management System</h2>

    <input type="number" id="id" placeholder="Enter Employee ID">
    <input type="text" id="name" placeholder="Enter Employee Name">
    <input type="number" id="salary" placeholder="Enter Salary">
    <input type="text" id="department" placeholder="Enter Department">

    <button onclick="addEmployee()">Add Employee</button>
    <button onclick="showEmployees()">Show Employees</button>
    <button onclick="salaryStats()">Salary Statistics</button>
    <button onclick="departmentCount()">Count Department</button>

    <div id="output"></div>

</div>

<script>

let employees = [];

function addEmployee(){

    let emp = {
        id: document.getElementById("id").value,
        name: document.getElementById("name").value,
        salary: Number(document.getElementById("salary").value),
        department: document.getElementById("department").value
    };

    employees.push(emp);

    alert("Employee Added");

    document.getElementById("id").value = "";
    document.getElementById("name").value = "";
    document.getElementById("salary").value = "";
    document.getElementById("department").value = "";
}

function showEmployees(){

    let result = "<h3>Employee Records</h3>";

    employees.forEach(emp => {

        result +=
        "ID: " + emp.id + "<br>" +
        "Name: " + emp.name + "<br>" +
        "Salary: ₹" + emp.salary + "<br>" +
        "Department: " + emp.department + "<br><hr>";
    });

    document.getElementById("output").innerHTML = result;
}

function salaryStats(){

    let total = 0;

    employees.forEach(emp => {
        total += emp.salary;
    });

    let average = total / employees.length;

    document.getElementById("output").innerHTML =
    "<h3>Salary Statistics</h3>" +
    "Total Salary: ₹" + total + "<br>" +
    "Average Salary: ₹" + average.toFixed(2);
}

function departmentCount(){

    let dept = {};

    employees.forEach(emp => {

        if(dept[emp.department]){
            dept[emp.department]++;
        }
        else{
            dept[emp.department] = 1;
        }
    });

    let result = "<h3>Department Count</h3>";

    for(let d in dept){
        result += d + " : " + dept[d] + "<br>";
    }

    document.getElementById("output").innerHTML = result;
}

</script>

</body>
</html>
