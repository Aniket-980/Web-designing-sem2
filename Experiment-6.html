<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Content Change</title>

    <style>
        body{
            font-family: Arial;
            text-align: center;
            background: #f2f2f2;
        }

        .box{
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input{
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button{
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background: blue;
            color: white;
            cursor: pointer;
        }

        #content{
            margin-top: 20px;
            font-size: 20px;
            color: darkblue;
        }
    </style>
</head>
<body>

<div class="box">

    <h2>Welcome to Javascript Lab</h2>

    <input type="text" id="textInput" placeholder="Enter new heading text">

    <br>

    <button onclick="changeText()">Change Heading</button>
    <button onclick="changeFontSize()">Increase Font size</button>
    <button onclick="changeBackground()">Change Background</button>
    <button onclick="reset()">Reset</button>

    <div id="content">Hello Student</div>

</div>

<script>

function changeText(){

    let text = document.getElementById("textInput").value;

    document.getElementById("content").innerHTML = text;
}

function changeFontSize(){

    let currentSize = parseFloat(window.getComputedStyle(document.getElementById("content")).fontSize);
    document.getElementById("content").style.fontSize = (currentSize + 2) + "px";
}

function changeBackground(){

    document.body.style.background = "lightblue";
}

function reset(){

    document.getElementById("content").innerHTML = "Hello Student";
    document.getElementById("textInput").value = "";
    document.body.style.background = "#f2f2f2";
    document.getElementById("content").style.fontSize = "20px";
}

</script>

</body>
</html>
