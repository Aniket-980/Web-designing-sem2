 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 25px;
            width: 320px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid gray;
            border-radius: 5px;
        }

        button {
            background-color: blue;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-top: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }

        #result {
            margin-top: 15px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>Student Result Calculator</h2>

        <input type="number" id="sub1" placeholder="Enter Subject 1 Marks">
        <input type="number" id="sub2" placeholder="Enter Subject 2 Marks">
        <input type="number" id="sub3" placeholder="Enter Subject 3 Marks">

        <button onclick="calculateResult()">Calculate Result</button>

        <div id="result"></div>
    </div>

    <script>
        function calculateResult() {

            let s1 = parseInt(document.getElementById("sub1").value);
            let s2 = parseInt(document.getElementById("sub2").value);
            let s3 = parseInt(document.getElementById("sub3").value);

            
            let total = s1 + s2 + s3;
            let percentage = total / 3;

            let grade;

            
            if (percentage >= 80) {
                grade = "A";
            }
            else if (percentage >= 60) {
                grade = "B";
            }
            else if (percentage >= 40) {
                grade = "C";
            }
            else {
                grade = "Fail";
            }

            
            let subjects = [s1, s2, s3];
            let marks = "";

            for (let i = 0; i < subjects.length; i++) {
                marks += "Subject " + (i + 1) + ": " + subjects[i] + "<br>";
            }

            document.getElementById("result").innerHTML =
                marks +
                "<br>Total Marks: " + total +
                "<br>Percentage: " + percentage.toFixed(2) + "%" +
                "<br>Grade: " + grade;
        }
    </script>

</body>
</html>
